# Application name (used for identification in logs, monitoring tools, etc.)
spring.application.name=campusconnect

# ---------------------- SERVER CONFIGURATION ----------------------

# Port on which the Spring Boot application will run
server.port=8080


# ---------------------- DATABASE CONFIGURATION ----------------------

# JDBC connection URL for the database
# Format: jdbc:database_type://host:port/database_name
spring.datasource.url=jdbc:mysql://localhost:3306/CampusConnect

# Database username used to connect to the database
spring.datasource.username=postgres

# Database password for authentication
spring.datasource.password=Rp@9137311556

# JDBC driver class for PostgreSQL database
spring.datasource.driver-class-name=org.postgresql.Driver


# ---------------------- JPA / HIBERNATE CONFIGURATION ----------------------

# Automatically update database schema based on entity classes
# Options: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries generated by Hibernate in the console
spring.jpa.show-sql=true

# Specify the Hibernate dialect (SQL syntax) for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Format SQL queries in console for better readability
spring.jpa.properties.hibernate.format_sql=true


# ---------------------- ERROR HANDLING CONFIGURATION ----------------------

# Include validation binding errors in API error responses
server.error.include-binding-errors=always

# Include detailed error messages in API responses
server.error.include-message=always