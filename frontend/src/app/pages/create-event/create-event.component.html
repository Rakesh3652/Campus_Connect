<!-- ======== HERO HEADER ======== -->
<div class="page-header">
  <h2>Create New Event</h2>
  <p>Fill in the details below to publish your event</p>
</div>

<!-- ======== FORM CARD ======== -->
<section class="form-section">
  <div class="form-card">

    <!-- Success Banner -->
    <div class="alert alert-success" *ngIf="submitSuccess">
      ✓ Event published successfully!
    </div>

    <!-- Error Banner -->
    <div class="alert alert-error" *ngIf="submitError">
      ! {{ submitError }}
    </div>

    <form (ngSubmit)="createEvent()">

      <div class="section-title">Basic Information</div>
      <div class="form-group">
        <label>Event Title <span class="req">*</span></label>
        <input type="text" class="form-input" placeholder="e.g. National Hackathon 2026" [(ngModel)]="event.title" name="title" required />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea class="form-input" placeholder="Describe your event..." [(ngModel)]="event.description" name="description"></textarea>
      </div>

      <div class="section-title">Schedule</div>
      <div class="input-row">
        <div class="form-group">
          <label>Start Date & Time <span class="req">*</span></label>
          <input type="datetime-local" class="form-input" [(ngModel)]="event.startTime" name="startTime" required />
        </div>
        <div class="form-group">
          <label>End Date & Time <span class="req">*</span></label>
          <input type="datetime-local" class="form-input" [(ngModel)]="event.endTime" name="endTime" required />
        </div>
      </div>

      <div class="section-title">Ticketing</div>
      <div class="input-row">
        <div class="form-group">
          <label>Ticket Price (₹)</label>
          <input type="number" class="form-input" placeholder="0.00" min="0" step="0.01" [(ngModel)]="event.price" name="price" />
        </div>
        <div class="form-group">
          <label>Total Capacity</label>
          <input type="number" class="form-input" placeholder="e.g. 200" min="1" [(ngModel)]="event.capacity" name="capacity" />
        </div>
      </div>

      <div class="section-title">Event Details</div>
      <div class="input-row">
        <div class="form-group">
          <label>Category</label>
          <select class="form-input" [(ngModel)]="event.category" name="category">
            <option value="" disabled selected>Select a category...</option>
            <option value="Workshop">Workshop</option>
            <option value="Festival">Festival</option>
            <option value="Competition">Competition</option>
            <option value="Music">Music</option>
          </select>
        </div>
        <div class="form-group">
          <label>Venue</label>
          <input type="text" class="form-input" placeholder="e.g. Main Auditorium" [(ngModel)]="event.venue" name="venue" />
        </div>
      </div>

      <div class="input-row">
        <div class="form-group">
          <label>Vendor</label>
          <input type="text" class="form-input" placeholder="e.g. Vendor A" [(ngModel)]="event.vendor" name="vendor" />
        </div>
        <div class="form-group">
          <label>College</label>
          <input type="text" class="form-input" placeholder="e.g. College of Engineering" [(ngModel)]="event.college" name="college" />
        </div>
      </div>

      <div class="section-title">Visibility</div>
      <div class="form-group">
        <label class="toggle-label">
          <input type="checkbox" [(ngModel)]="event.isActive" name="isActive" class="toggle-checkbox" />
          <span class="toggle-text">Event is {{ event.isActive ? 'Active' : 'Inactive' }}</span>
        </label>
      </div>

      <button class="btn-submit" type="submit" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Publish Event</span>
        <span *ngIf="isSubmitting">Publishing...</span>
      </button>

    </form>
  </div>
</section>
